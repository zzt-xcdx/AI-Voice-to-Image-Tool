<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice2Canvas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <div class="max-w-5xl mx-auto px-4 py-10 space-y-6">
    <header class="mb-2">
      <p class="text-sm text-emerald-400 font-medium">语音绘图 Demo</p>
      <h1 class="text-3xl font-bold mt-1">Voice2Canvas</h1>
      <p class="text-slate-400 mt-2">全程语音：录音 → ASR+LLM → 绘制命令 → Canvas 执行（支持撤销/清空/保存）。</p>
    </header>

    <div class="grid gap-4 lg:grid-cols-3">
      <section class="lg:col-span-1 rounded-xl border border-slate-800 bg-slate-900/70 p-4 space-y-3">
        <div class="flex items-center gap-2">
          <button id="recordBtn" class="w-28 px-3 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-sm font-semibold">开始录音</button>
          <button id="stopBtn" class="w-20 px-3 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm font-semibold" disabled>停止</button>
          <a href="/docs" target="_blank" class="ml-auto px-3 py-2 rounded-lg border border-slate-700 text-xs text-slate-300 hover:bg-slate-800">API 文档</a>
        </div>
        <p class="text-xs text-slate-400">示例：<br>“画一个红色圆形在左上角”<br>“再画一个蓝色矩形在右下角，边框黑色粗一点”<br>“撤销上一步” “清空画布” “保存图片”</p>
        <div class="text-xs text-amber-300" id="status">待机</div>
      </section>

      <section class="lg:col-span-2 rounded-xl border border-slate-800 bg-slate-900/60 p-4">
        <canvas id="canvas" class="w-full border border-slate-800 rounded-lg bg-white" width="960" height="600"></canvas>
        <div class="mt-3 flex gap-2 text-xs text-slate-400">
          <button id="undoBtn" class="px-3 py-1 rounded bg-slate-800 hover:bg-slate-700">撤销</button>
          <button id="clearBtn" class="px-3 py-1 rounded bg-slate-800 hover:bg-slate-700">清空</button>
          <button id="saveBtn" class="px-3 py-1 rounded bg-slate-800 hover:bg-slate-700">保存</button>
        </div>
      </section>
    </div>

    <section class="grid gap-4 lg:grid-cols-2">
      <div class="rounded-xl border border-slate-800 bg-slate-900/50 p-4 space-y-2">
        <h2 class="text-sm font-semibold text-slate-200">识别与回复</h2>
        <p class="text-xs text-slate-400">ASR 文本：</p>
        <div id="asrText" class="text-sm text-slate-100 min-h-[40px]"></div>
        <p class="text-xs text-slate-400 mt-2">回复：</p>
        <div id="replyText" class="text-sm text-emerald-200 min-h-[40px]"></div>
      </div>
      <div class="rounded-xl border border-slate-800 bg-slate-900/50 p-4 space-y-2">
        <h2 class="text-sm font-semibold text-slate-200">解析到的命令</h2>
        <pre id="commandJson" class="text-xs text-slate-200 bg-slate-950 border border-slate-800 rounded-lg p-3 min-h-[120px] whitespace-pre-wrap"></pre>
      </div>
    </section>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const asrEl = document.getElementById("asrText");
    const replyEl = document.getElementById("replyText");
    const commandEl = document.getElementById("commandJson");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const stack = [];

    let audioCtx = null;
    let mediaStream = null;
    let processor = null;
    let source = null;
    let pcmData = [];
    const targetSampleRate = 16000;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    async function startRecording() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("浏览器不支持录音");
        return;
      }
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: targetSampleRate });
      source = audioCtx.createMediaStreamSource(mediaStream);
      processor = audioCtx.createScriptProcessor(4096, 1, 1);
      pcmData = [];
      processor.onaudioprocess = (e) => {
        const input = e.inputBuffer.getChannelData(0);
        pcmData.push(new Float32Array(input));
      };
      source.connect(processor);
      processor.connect(audioCtx.destination);
      document.getElementById("recordBtn").disabled = true;
      document.getElementById("stopBtn").disabled = false;
      setStatus("录音中… 再次点击停止");
    }

    function stopRecording() {
      if (!audioCtx || !processor) return;
      processor.disconnect();
      source.disconnect();
      mediaStream.getTracks().forEach(t => t.stop());
      audioCtx.close();
      document.getElementById("recordBtn").disabled = false;
      document.getElementById("stopBtn").disabled = true;
      setStatus("上传识别中…");
      const wavBlob = exportWAV(pcmData, targetSampleRate);
      sendAudio(wavBlob);
    }

    function interleave(buffers, length) {
      const result = new Float32Array(length);
      let offset = 0;
      buffers.forEach(buf => {
        result.set(buf, offset);
        offset += buf.length;
      });
      return result;
    }

    function floatTo16BitPCM(float32Array) {
      const buffer = new ArrayBuffer(float32Array.length * 2);
      const view = new DataView(buffer);
      let offset = 0;
      for (let i = 0; i < float32Array.length; i++, offset += 2) {
        let s = Math.max(-1, Math.min(1, float32Array[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      }
      return buffer;
    }

    function writeWavHeader(view, sampleRate, numSamples) {
      const blockAlign = 2; // mono 16bit
      const byteRate = sampleRate * blockAlign;
      view.setUint32(0, 0x52494646, false); // "RIFF"
      view.setUint32(4, 36 + numSamples * 2, true);
      view.setUint32(8, 0x57415645, false); // "WAVE"
      view.setUint32(12, 0x666d7420, false); // "fmt "
      view.setUint32(16, 16, true); // PCM
      view.setUint16(20, 1, true); // format
      view.setUint16(22, 1, true); // channels
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, byteRate, true);
      view.setUint16(32, blockAlign, true);
      view.setUint16(34, 16, true); // bits
      view.setUint32(36, 0x64617461, false); // "data"
      view.setUint32(40, numSamples * 2, true);
    }

    function exportWAV(chunks, sampleRate) {
      const length = chunks.reduce((sum, b) => sum + b.length, 0);
      const pcm = interleave(chunks, length);
      const pcm16 = floatTo16BitPCM(pcm);
      const wavBuffer = new ArrayBuffer(44 + pcm16.byteLength);
      const view = new DataView(wavBuffer);
      writeWavHeader(view, sampleRate, pcm.length);
      new Uint8Array(wavBuffer, 44).set(new Uint8Array(pcm16));
      return new Blob([wavBuffer], { type: "audio/wav" });
    }

    async function sendAudio(blob) {
      const form = new FormData();
      form.append("file", blob, "speech.wav");
      try {
        const res = await fetch("/api/asr-nlu", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.statusText);
        asrEl.textContent = data.asr_text || "";
        replyEl.textContent = data.reply_text || "";
        commandEl.textContent = JSON.stringify(data.commands, null, 2);
        applyCommands(data.commands || []);
        setStatus("完成");
      } catch (err) {
        setStatus("错误：" + err.message);
      }
    }

    function applyCommands(commands) {
      for (const cmd of commands) {
        if (cmd.action === "undo") {
          stack.pop();
        } else if (cmd.action === "clear") {
          stack.length = 0;
        } else if (cmd.action === "save") {
          saveCanvas();
        } else if (cmd.action === "draw") {
          stack.push(cmd);
        }
      }
      redraw();
    }

    function redraw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const cmd of stack) {
        if (cmd.action !== "draw") continue;
        drawShape(cmd);
      }
    }

    function toPx(val, axis) {
      return (val || 0.5) * (axis === "x" ? canvas.width : canvas.height);
    }

    function drawShape(cmd) {
      const pos = cmd.position || {};
      const size = cmd.size || {};
      const x = toPx(pos.x, "x");
      const y = toPx(pos.y, "y");
      const w = size.relative === false ? (size.width || 100) : (size.width || 0.2) * canvas.width;
      const h = size.relative === false ? (size.height || 100) : (size.height || 0.2) * canvas.height;

      ctx.save();
      ctx.fillStyle = cmd.fill || cmd.color || "#ff0000";
      if (cmd.stroke) {
        ctx.strokeStyle = cmd.stroke.color || "#000000";
        ctx.lineWidth = cmd.stroke.width || 2;
      }

      switch (cmd.shape) {
        case "circle": {
          const r = Math.min(w, h) / 2;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fill();
          if (cmd.stroke) ctx.stroke();
          break;
        }
        case "rect": {
          const ax = x - w / 2;
          const ay = y - h / 2;
          ctx.beginPath();
          ctx.rect(ax, ay, w, h);
          ctx.fill();
          if (cmd.stroke) ctx.stroke();
          break;
        }
        case "triangle": {
          const ax = x;
          const ay = y - h / 2;
          const bx = x - w / 2;
          const by = y + h / 2;
          const cx = x + w / 2;
          const cy = y + h / 2;
          ctx.beginPath();
          ctx.moveTo(ax, ay);
          ctx.lineTo(bx, by);
          ctx.lineTo(cx, cy);
          ctx.closePath();
          ctx.fill();
          if (cmd.stroke) ctx.stroke();
          break;
        }
        case "line": {
          ctx.beginPath();
          ctx.moveTo(x - w / 2, y - h / 2);
          ctx.lineTo(x + w / 2, y + h / 2);
          if (cmd.stroke) {
            ctx.stroke();
          } else {
            ctx.strokeStyle = cmd.color || "#000000";
            ctx.lineWidth = 2;
            ctx.stroke();
          }
          break;
        }
        case "text": {
          ctx.fillStyle = cmd.color || "#000000";
          ctx.font = `${Math.max(16, Math.floor(h))}px sans-serif`;
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(cmd.text || "", x, y);
          break;
        }
        default:
          break;
      }
      ctx.restore();
    }

    function saveCanvas() {
      const url = canvas.toDataURL("image/png");
      const a = document.createElement("a");
      a.href = url;
      a.download = "voice-drawing.png";
      a.click();
    }

    document.getElementById("recordBtn").onclick = startRecording;
    document.getElementById("stopBtn").onclick = stopRecording;
    document.getElementById("undoBtn").onclick = () => {
      stack.pop();
      redraw();
    };
    document.getElementById("clearBtn").onclick = () => {
      stack.length = 0;
      redraw();
    };
    document.getElementById("saveBtn").onclick = saveCanvas;
  </script>
</body>
</html>
