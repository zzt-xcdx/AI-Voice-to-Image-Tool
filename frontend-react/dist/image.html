<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice2Canvas - AI 画图</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body, button, input, textarea {
        font-family: "Arial", "Helvetica Neue", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="mx-auto max-w-5xl px-4 py-8 space-y-6">
      <header class="flex items-center gap-3 justify-between">
        <div class="flex items-center gap-3">
          <a href="/" class="text-sm text-slate-500 hover:underline">← 返回选择</a>
          <div>
            <p class="text-xs uppercase text-emerald-500 font-semibold">模式：AI 画图</p>
            <h1 class="text-2xl font-bold text-slate-900">提示词润色 + Qianfan 生图</h1>
            <p class="text-slate-600 text-sm">语音/文字 → LLM 英文提示词 → 图片生成</p>
          </div>
        </div>
        <button id="btn-exit" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">退出画图</button>
      </header>

      <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
        <div class="flex items-center gap-2">
          <div class="text-xs text-slate-500">状态</div>
          <span id="status" class="text-xs text-amber-700">未开启监听</span>
        </div>
          <div class="text-xs text-slate-500">也可直接输入文字测试</div>
          <textarea id="txt" class="w-full rounded-lg border border-slate-200 p-2 text-sm" rows="2" placeholder="示例：画一只在宇宙中漂浮的宇航员猫咪"></textarea>
          <div class="text-xs text-slate-500 mt-2">录音中实时文本（浏览器识别预览，提交走后端 ASR）</div>
          <div id="live" class="min-h-[36px] rounded-lg border border-slate-100 bg-slate-50 p-2 text-sm text-amber-700"></div>
        <div class="flex flex-wrap gap-2">
          <button id="btn-send-text" class="rounded-lg bg-emerald-600 text-white px-3 py-2 text-sm font-semibold hover:bg-emerald-500">文字测试（图片模式）</button>
          <button id="btn-retry" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100" style="display:none;">重试上一条</button>
        </div>
        <div>
          <div class="text-xs text-slate-500 mb-1">ASR 文本</div>
          <div id="asr" class="min-h-[36px] rounded-lg border border-slate-100 bg-slate-50 p-2 text-sm text-slate-800"></div>
        </div>
        <div>
          <div class="text-xs text-slate-500 mb-1">LLM 优化英文提示词</div>
          <div id="prompt-en" class="min-h-[36px] rounded-lg border border-slate-100 bg-slate-50 p-2 text-sm text-emerald-700"></div>
        </div>
        <div>
          <div class="text-xs text-slate-500 mb-1">生成图片</div>
          <div id="img-box" class="rounded-lg border border-slate-100 bg-slate-50 p-3 flex items-center justify-center min-h-[280px]">
            <span class="text-slate-400 text-sm">等待生成…</span>
          </div>
        </div>
      </section>

      <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
        <h2 class="text-sm font-semibold text-slate-900">画板库接口（保存/加载）</h2>
        <div class="flex flex-wrap items-center gap-2">
          <input id="title" class="rounded-lg border border-slate-200 px-3 py-2 text-sm" placeholder="保存标题（可选）" />
          <button id="btn-save" class="rounded-lg bg-emerald-600 text-white px-3 py-2 text-sm font-semibold hover:bg-emerald-500">保存当前图片</button>
          <button id="btn-list" class="rounded-lg border border-slate-200 px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100">刷新列表</button>
        </div>
        <div id="save-status" class="text-xs text-amber-700"></div>
        <div id="list" class="grid gap-2 md:grid-cols-2"></div>
      </section>

      <section class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
        <h3 class="text-sm font-semibold text-slate-900 mb-2">测试用例</h3>
        <ul class="list-disc pl-5 text-sm text-slate-700 space-y-1">
          <li>"画一只在宇宙中漂浮的宇航员猫咪"</li>
          <li>"一个赛博朋克风格的城市夜景"</li>
        </ul>
      </section>
    </div>

    <script>
      const apiBase = "";
      let mediaRecorder = null;
      let chunks = [];
      const $ = (id) => document.getElementById(id);
      const setStatus = (msg, tone = "info") => {
        const el = $("status");
        el.textContent = msg || "";
        el.className = "text-xs " + (tone === "error" ? "text-rose-700" : "text-amber-700");
      };
      const stateLabel = {
        idle: "等待指令",
        listening: "倾听中",
        recording: "录音中…",
        uploading: "上传识别中…",
        analyzing: "LLM 处理中…",
        generating: "生成图片…",
        tts: "语音播报中",
        done: "完成",
        error: "出错",
      };
      let currentState = "idle";
      const setState = (s, msg, tone = "info") => {
        currentState = s;
        setStatus(msg || stateLabel[s] || "", tone);
        document.body.dataset.state = s;
      };
      let ttsSpeaking = false;
      let voiceManualEnabled = true;
      let voiceAutoPaused = false;
      const VOICE_CMD_WINDOW = 96;
      let voiceCmdLockUntil = 0;

      const normalizeVoiceCmd = (text) =>
        (text || "")
          .replace(/\s/g, "")
          .toLowerCase()
          .replace(/开启语言/g, "开启语音")
          .replace(/打开语言/g, "打开语音")
          .replace(/关闭语言/g, "关闭语音")
          .replace(/关掉语言/g, "关掉语音")
          .replace(/开起语音/g, "开启语音")
          .replace(/观闭语音/g, "关闭语音")
          .replace(/关毕语音/g, "关闭语音")
          .replace(/下载途片/g, "下载图片")
          .replace(/下載图片/g, "下载图片");

      const voiceCmdWindow = (text) => {
        const t = normalizeVoiceCmd(text);
        return t.length <= VOICE_CMD_WINDOW ? t : t.slice(-VOICE_CMD_WINDOW);
      };

      const clearHeardBuffer = () => {
        segmentFinalText = "";
        $("live").textContent = "";
      };

      const matchEnableVoice = (text) => {
        const t = voiceCmdWindow(text);
        return /(开启语音|打开语音|开语音|语音开启|开始语音|开麦)/.test(t);
      };
      const matchDisableVoice = (text) => {
        const t = voiceCmdWindow(text);
        return /(关闭语音|关掉语音|关语音|语音关闭|停止语音|关麦)/.test(t);
      };

      const runVoiceCmd = (fn) => {
        if (Date.now() < voiceCmdLockUntil) return false;
        fn();
        voiceCmdLockUntil = Date.now() + 800;
        clearHeardBuffer();
        return true;
      };

      const setVoiceOff = (manual = true) => {
        voiceManualEnabled = false;
        if (manual) voiceAutoPaused = false;
        if (isSpeaking) {
          isSpeaking = false;
          speakingStartMs = 0;
          lastVoiceMs = 0;
          discardRecording();
        }
        clearHeardBuffer();
        updateBubbleUI();
        setState("idle", manual ? "语音已关闭，可说「开启语音」恢复" : "语音已暂停");
      };
      const setVoiceOn = () => {
        voiceManualEnabled = true;
        voiceAutoPaused = false;
        updateBubbleUI();
        setState("listening", "监听中：请开始说话");
      };
      const pauseVoiceForTask = (msg) => {
        voiceAutoPaused = true;
        voiceManualEnabled = false;
        if (isSpeaking) {
          isSpeaking = false;
          speakingStartMs = 0;
          lastVoiceMs = 0;
          discardRecording();
        }
        clearHeardBuffer();
        updateBubbleUI();
        setState("uploading", msg || "正在生成，语音已暂停…");
      };
      const resumeVoiceAfterTask = (msg) => {
        if (!voiceAutoPaused) return;
        voiceAutoPaused = false;
        voiceManualEnabled = true;
        updateBubbleUI();
        setState("listening", msg || "可以继续说话了，请描述下一张图");
      };
      const isDownloadIntentError = (err) => {
        const msg = String(err?.message || err || "");
        return msg.includes("VOICE_DOWNLOAD_IMAGE");
      };
      const handleDescribeError = (err) => {
        if (isDownloadIntentError(err)) {
          releaseGeneratingLock();
          downloadImage();
          resumeVoiceAfterTask("已下载图片，可继续说下一张描述");
          setState("done");
          return true;
        }
        releaseGeneratingLock();
        resumeVoiceAfterTask("出错了，可以重新说");
        setState("error", err.message || "错误", "error");
        speak(err.message || "发生错误").catch(() => {});
        return false;
      };
      const processRecognizerText = (text) => {
        if (!text || ttsSpeaking) return;
        const windowText = voiceCmdWindow(text);
        if (matchDisableVoice(windowText)) {
          runVoiceCmd(() => setVoiceOff(true));
          return;
        }
        if (matchDownloadImage(windowText)) {
          checkDownloadCommand(text);
          return;
        }
        if (!voiceManualEnabled) {
          if (matchEnableVoice(windowText)) runVoiceCmd(setVoiceOn);
          return;
        }
        $("live").textContent = text;
        if (checkDownloadCommand(text)) return;
        checkExitCommand(text);
        handleVoiceCommand(text);
      };

      const speak = (text) =>
        new Promise((resolve) => {
          if (!text) return resolve();
          const utter = new SpeechSynthesisUtterance(text);
          utter.lang = "zh-CN";
          utter.rate = 1.0;
          utter.pitch = 1.0;
          utter.onstart = () => {
            ttsSpeaking = true;
            setState("tts");
          };
          utter.onend = () => {
            ttsSpeaking = false;
            resolve();
          };
          utter.onerror = () => {
            ttsSpeaking = false;
            resolve();
          };
          window.speechSynthesis.speak(utter);
        });
      let historyPrompt = null;
      let downloadLock = false;
      const matchDownloadImage = (text) => {
        const t = voiceCmdWindow(text);
        if (/(下载图片|保存图片|下载这张图|把图片下载|下载这幅图|下载相片|保存相片)/.test(t)) return true;
        if (t.length <= 18 && /下载/.test(t) && /图|片|相片|照片/.test(t)) return true;
        if (t.length <= 14 && /保存/.test(t) && /图|片/.test(t)) return true;
        return false;
      };
      const checkDownloadCommand = (text) => {
        if (!text) return false;
        if (!matchDownloadImage(text)) return false;
        if (downloadLock) return true;
        downloadLock = true;
        setStatus("正在下载图片…");
        downloadImage().finally(() => {
          setTimeout(() => (downloadLock = false), 2000);
        });
        return true;
      };
      const parseIndex = (text) => {
        const m = text.match(/第(\d+)|(\d+)[条个号]?/);
        if (!m) return null;
        return Number(m[1] || m[2]);
      };
      const handleVoiceCommand = (text) => {
        if (!text || commandLock) return false;
        if (matchDisableVoice(text)) {
          setVoiceOff(true);
          return true;
        }
        const t = text.toLowerCase();
        if (checkExitCommand(t) || checkDownloadCommand(t)) return true;
        const idx = parseIndex(t);
        if (t.includes("刷新")) {
          commandLock = true;
          fetchList().finally(() => (commandLock = false));
          return true;
        }
        if (idx && (t.includes("加载") || t.includes("打开"))) {
          commandLock = true;
          loadByNumber(idx);
          setTimeout(() => (commandLock = false), 800);
          return true;
        }
        if (idx && t.includes("删除")) {
          commandLock = true;
          deleteByNumber(idx);
          setTimeout(() => (commandLock = false), 800);
          return true;
        }
        if (t.includes("重试")) {
          commandLock = true;
          retryLast().finally(() => (commandLock = false));
          return true;
        }
        return false;
      };
      const exitImage = async () => {
        await shutdownAudio();
        window.location.href = "/";
      };
      const checkExitCommand = (text) => {
        if (!text) return false;
        const t = text.toLowerCase();
        if (t.includes("退出") || t.includes("离开") || t.includes("返回") || t.includes("回首页") || t.includes("回主界面")) {
          exitImage();
          return true;
        }
        return false;
      };
      const renderImage = (b64) => {
        const box = $("img-box");
        const norm = normalizeImageB64(b64);
        if (!norm) {
          box.innerHTML = '<span class="text-slate-400 text-sm">等待生成…</span>';
          return;
        }
        box.innerHTML = '<img class="max-h-[360px] rounded-lg shadow" src="data:image/png;base64,' + norm + '" />';
      };
      const normalizeImageB64 = (raw) => {
        if (!raw) return "";
        const s = String(raw).trim();
        const m = s.match(/^data:image\/[^;]+;base64,(.+)$/i);
        return m ? m[1] : s.replace(/^data:image\/[^;]+;base64,/, "");
      };
      let lastPayload = null;
      let segmentFinalText = "";
      const inputCooldownMs = 3000;
      let inputCooldownUntil = 0;
      let generatingLock = false;
      const releaseGeneratingLock = () => {
        generatingLock = false;
        inputCooldownUntil = Date.now() + inputCooldownMs;
      };
      const blobToWav16k = async (blob) => {
        const ctx = new AudioContext({ sampleRate: 16000 });
        try {
          const decoded = await ctx.decodeAudioData(await blob.arrayBuffer());
          const len = decoded.length;
          const channels = decoded.numberOfChannels;
          const mono = new Float32Array(len);
          for (let c = 0; c < channels; c++) {
            const ch = decoded.getChannelData(c);
            for (let i = 0; i < len; i++) mono[i] += ch[i] / channels;
          }
          let samples = mono;
          if (decoded.sampleRate !== 16000) {
            const ratio = decoded.sampleRate / 16000;
            const newLen = Math.floor(len / ratio);
            const resampled = new Float32Array(newLen);
            for (let i = 0; i < newLen; i++) resampled[i] = mono[Math.floor(i * ratio)];
            samples = resampled;
          }
          const dataLen = samples.length * 2;
          const wavBuf = new ArrayBuffer(44 + dataLen);
          const view = new DataView(wavBuf);
          const writeStr = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
          writeStr(0, "RIFF");
          view.setUint32(4, 36 + dataLen, true);
          writeStr(8, "WAVE");
          writeStr(12, "fmt ");
          view.setUint32(16, 16, true);
          view.setUint16(20, 1, true);
          view.setUint16(22, 1, true);
          view.setUint32(24, 16000, true);
          view.setUint32(28, 16000 * 2, true);
          view.setUint16(32, 2, true);
          view.setUint16(34, 16, true);
          writeStr(36, "data");
          view.setUint32(40, dataLen, true);
          let off = 44;
          for (let i = 0; i < samples.length; i++) {
            const s = Math.max(-1, Math.min(1, samples[i]));
            view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7fff, true);
            off += 2;
          }
          return new Blob([wavBuf], { type: "audio/wav" });
        } finally {
          await ctx.close();
        }
      };
      const sendDescribe = async ({ blob, text }) => {
        if (generatingLock) throw new Error("上一张图片还在生成中，请稍候");
        generatingLock = true;
        pauseVoiceForTask(blob ? "上传音频中，语音已暂停…" : "正在生成，语音已暂停…");
        const shouldBlock = (txt) => {
          if (!txt) return false;
          const lower = txt.toLowerCase();
          return lower.includes("返回主菜单") || lower.includes("回主菜单") || lower.includes("回首页");
        };
        if (text && matchDownloadImage(text)) {
          releaseGeneratingLock();
          resumeVoiceAfterTask();
          checkDownloadCommand(text);
          return Promise.reject(new Error("VOICE_DOWNLOAD_IMAGE"));
        }
        const form = new FormData();
        if (blob) {
          if (blob.size === 0) {
            releaseGeneratingLock();
            resumeVoiceAfterTask();
            throw new Error("未录到音频");
          }
          const wavBlob = await blobToWav16k(blob);
          form.append("file", wavBlob, "speech.wav");
        }
        if (text) {
          if (shouldBlock(text)) {
            releaseGeneratingLock();
            setState("idle", "返回主菜单指令已忽略");
            exitImage();
            return Promise.reject(new Error("返回主菜单指令，已忽略上传"));
          }
          form.append("text", text);
        }
        if (historyPrompt) form.append("prior_prompt", historyPrompt);
        lastPayload = { blob, text };
        setState("uploading", blob ? "上传音频…" : "提交文本…");
        const res = await fetch(`${apiBase}/api/voice/describe?mode=image`, { method: "POST", body: form });
        const t = await res.text();
        if (!t) throw new Error(res.statusText || "后端无返回");
        let data;
        try { data = JSON.parse(t); } catch { throw new Error(`返回非 JSON：${t.slice(0, 120)}`); }
        if (!res.ok) throw new Error(data.detail || res.statusText);
        return data;
      };
      const handleResult = (data) => {
        $("asr").textContent = data.asr_text || "";
        $("prompt-en").textContent = data.merged_prompt_en || data.prompt_en || "";
        const normB64 = normalizeImageB64(data.image_base64);
        renderImage(normB64);
        releaseGeneratingLock();
        window._lastImage = { ...data, image_base64: normB64 };
        if (data.merged_prompt_en || data.prompt_en) {
          historyPrompt = data.merged_prompt_en || data.prompt_en;
        }
        fetchList();
        speak("已经理解你的描述，图片已生成。")
          .catch(() => {})
          .finally(() => resumeVoiceAfterTask("图片已生成，请继续说下一张描述"));
        $("btn-retry").style.display = lastPayload ? "inline-flex" : "none";
      };
      const discardRecording = () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          mediaRecorder.onstop = () => {
            chunks = [];
          };
          mediaRecorder.stop();
        } else {
          chunks = [];
        }
      };
      const finishSpeechSegment = () => {
        if (!voiceManualEnabled) {
          discardRecording();
          segmentFinalText = "";
          $("live").textContent = "";
          isSpeaking = false;
          return;
        }
        if (generatingLock) {
          discardRecording();
          segmentFinalText = "";
          $("live").textContent = "";
          isSpeaking = false;
          return;
        }
        const text = ($("live").textContent || segmentFinalText || "").trim();
        segmentFinalText = "";
        if (text && checkDownloadCommand(text)) {
          $("live").textContent = "";
          discardRecording();
          isSpeaking = false;
          return;
        }
        if (text && handleVoiceCommand(text)) {
          $("live").textContent = "";
          discardRecording();
          isSpeaking = false;
          return;
        }
        if (!mediaRecorder || mediaRecorder.state !== "recording") {
          setState("listening", "未录到音频，请重说");
          $("live").textContent = "";
          return;
        }
        pauseVoiceForTask("上传音频中，语音已暂停…");
        mediaRecorder.onstop = () => {
          const blob = new Blob(chunks, { type: "audio/webm" });
          chunks = [];
          sendDescribe({ blob })
            .then((data) => {
              setState("analyzing", "LLM 生成提示词…");
              handleResult(data);
              $("live").textContent = "";
              setState("done");
            })
            .catch((err) => {
              if (!handleDescribeError(err)) return;
            });
        };
        mediaRecorder.stop();
      };
      // --- 语音悬浮球与自动 VAD ---
      let audioCtx = null;
      let sourceNode = null;
      let processorNode = null;
      let vadEnabled = false;
      let isSpeaking = false;
      let energyThreshold = 0.01; // 初始阈值，后续自适应
      let speakingStartMs = 0;
      let lastVoiceMs = 0;
      const minSpeechMs = 800; // 至少说0.8s
      const silenceStopMs = 3000; // 连续静音3s才收口
      let listeningStarting = false;
      let recognizer = null;

      const canAcceptVoiceInput = () =>
        vadEnabled &&
        voiceManualEnabled &&
        !ttsSpeaking &&
        !generatingLock &&
        !isSpeaking &&
        Date.now() >= inputCooldownUntil;

      const initPersistentRecognizer = () => {
        try {
          if (recognizer || ttsSpeaking) return;
          const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          if (!Recognition) return;
          const r = new Recognition();
          r.continuous = true;
          r.interimResults = true;
          r.lang = "zh-CN";
          r.onresult = (ev) => {
            if (ttsSpeaking) return;
            let interim = "";
            for (let i = ev.resultIndex; i < ev.results.length; i++) {
              const res = ev.results[i];
              if (res.isFinal) {
                segmentFinalText += res[0].transcript;
                if (segmentFinalText.length > 300) segmentFinalText = segmentFinalText.slice(-150);
              }
              else interim += res[0].transcript;
            }
            processRecognizerText(segmentFinalText + interim);
          };
          r.onerror = () => {};
          r.onend = () => {
            if (vadEnabled && !ttsSpeaking) {
              try {
                r.start();
              } catch (e) {}
            }
          };
          r.start();
          recognizer = r;
        } catch (e) {}
      };

      const stopRecognizer = () => {
        if (recognizer) {
          try {
            recognizer.stop();
          } catch (e) {}
          recognizer = null;
        }
      };

      const stopMediaRecorder = async () => {
        if (mediaRecorder && mediaRecorder.state === "recording") {
          return new Promise((resolve) => {
            mediaRecorder.onstop = resolve;
            mediaRecorder.stop();
          });
        }
        return Promise.resolve();
      };

      const teardownAudio = async () => {
        await stopMediaRecorder();
        stopRecognizer();
        if (processorNode) processorNode.disconnect();
        if (sourceNode) sourceNode.disconnect();
        if (audioCtx) audioCtx.close();
        processorNode = null;
        sourceNode = null;
        audioCtx = null;
      };

      const shutdownAudio = async () => {
        vadEnabled = false;
        isSpeaking = false;
        await teardownAudio();
      };

      const updateBubbleUI = () => {
        if (voiceManualEnabled) {
          bubble.textContent = "语音 On";
          bubble.style.background = "#059669";
        } else if (voiceAutoPaused || generatingLock) {
          bubble.textContent = "生成中";
          bubble.style.background = "#d97706";
        } else {
          bubble.textContent = "语音 Off";
          bubble.style.background = "#0f172a";
        }
      };

      const startListening = async () => {
        if (vadEnabled || listeningStarting) return;
        listeningStarting = true;
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus("浏览器不支持录音", "error");
          listeningStarting = false;
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          chunks = [];
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          sourceNode = audioCtx.createMediaStreamSource(stream);
          processorNode = audioCtx.createScriptProcessor(2048, 1, 1);
          sourceNode.connect(processorNode);
          processorNode.connect(audioCtx.destination);

          let noiseFloor = 0;
          let frameCount = 0;

          processorNode.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            let sum = 0;
            for (let i = 0; i < input.length; i++) sum += input[i] * input[i];
            const rms = Math.sqrt(sum / input.length);

            // 动态估计噪声底
            if (frameCount < 50) {
              noiseFloor = (noiseFloor * frameCount + rms) / (frameCount + 1);
              energyThreshold = Math.max(0.01, noiseFloor * 3.5);
              frameCount++;
            }

            const now = Date.now();

            if (!isSpeaking && rms > energyThreshold) {
              if (!canAcceptVoiceInput()) return;
              isSpeaking = true;
              speakingStartMs = now;
              lastVoiceMs = now;
              segmentFinalText = "";
              $("live").textContent = "";
              chunks = [];
              mediaRecorder.start();
              setState("recording", "检测到语音，录音中…");
            } else if (isSpeaking) {
              if (rms > energyThreshold * 0.6) {
                lastVoiceMs = now;
              }
              const spokenMs = now - speakingStartMs;
              const silentMs = now - lastVoiceMs;
              if (spokenMs >= minSpeechMs && silentMs > silenceStopMs) {
                isSpeaking = false;
                speakingStartMs = 0;
                lastVoiceMs = 0;
                finishSpeechSegment();
                }
            }
          };

          vadEnabled = true;
          initPersistentRecognizer();
          updateBubbleUI();
          setState(voiceManualEnabled ? "listening" : "idle", voiceManualEnabled ? "监听中：请开始说话" : "语音已关闭，可说「开启语音」恢复");
        } catch (err) {
          voiceManualEnabled = false;
          vadEnabled = false;
          updateBubbleUI();
          setState("error", err?.message || "麦克风开启失败", "error");
        } finally {
          listeningStarting = false;
        }
      };

      // 悬浮球控制
      const bubble = document.createElement("button");
      bubble.id = "voice-bubble";
      bubble.style.position = "fixed";
      bubble.style.bottom = "18px";
      bubble.style.right = "18px";
      bubble.style.width = "64px";
      bubble.style.height = "64px";
      bubble.style.borderRadius = "50%";
      bubble.style.background = "#0f172a";
      bubble.style.color = "#fff";
      bubble.style.boxShadow = "0 12px 24px rgba(15,23,42,0.25)";
      bubble.style.border = "none";
      bubble.style.cursor = "pointer";
      bubble.style.fontWeight = "700";
      bubble.style.fontSize = "12px";
      bubble.textContent = "语音 Off";
      bubble.onclick = () => {
        if (generatingLock || voiceAutoPaused) {
          setStatus("正在生成中，请稍候完成后再操作语音");
          return;
        }
        if (voiceManualEnabled) setVoiceOff(true);
        else setVoiceOn();
      };
      document.body.appendChild(bubble);
      updateBubbleUI();
      startListening();
      const sendText = async () => {
        const text = $("txt").value;
        if (!text.trim()) {
          setStatus("请输入文本", "error");
          return;
        }
        if (matchDownloadImage(text)) {
          checkDownloadCommand(text);
          return;
        }
        setState("analyzing", "LLM 处理中…");
        try {
          const data = await sendDescribe({ text });
          handleResult(data);
          setState("done");
        } catch (err) {
          handleDescribeError(err);
        }
      };
      const retryLast = async () => {
        if (!lastPayload) {
          setState("error", "暂无可重试的内容", "error");
          return;
        }
        setState("analyzing", "重试中…");
        try {
          const data = await sendDescribe(lastPayload);
          handleResult(data);
          setState("done");
        } catch (err) {
          handleDescribeError(err);
        }
      };

      $("btn-send-text").onclick = sendText;
      $("btn-retry").onclick = retryLast;
      $("btn-exit").onclick = exitImage;
      renderImage("");

      // --- 保存/加载 ---
      const listEl = $("list");
      const saveStatusEl = $("save-status");
      const setSaveStatus = (msg, tone = "info") => {
        saveStatusEl.textContent = msg || "";
        saveStatusEl.className = "text-xs " + (tone === "error" ? "text-rose-700" : "text-amber-700");
      };
      let listCache = [];
      let commandLock = false;
      const renderList = (items) => {
        listCache = items || [];
        if (!items || !items.length) {
          listEl.innerHTML = '<div class="text-sm text-slate-500">暂无记录</div>';
          return;
        }
        listEl.innerHTML = items
          .map(
            (d) => `
          <div class="rounded-lg border border-slate-200 p-3 text-sm text-slate-800 space-y-1">
            <div class="font-semibold truncate">${d.title || `画板 #${d.id}`}</div>
            <div class="text-xs text-slate-500">ID: ${d.id}</div>
            <div class="text-xs text-slate-500">命令数：${d.commands?.length || 0}</div>
            <div class="flex gap-2 pt-1">
              <button data-id="${d.id}" class="btn-load rounded border border-slate-200 px-2 py-1 text-xs hover:bg-slate-100">加载</button>
              <button data-id="${d.id}" class="btn-delete rounded border border-rose-200 px-2 py-1 text-xs text-rose-700 hover:bg-rose-50">删除</button>
            </div>
          </div>
        `
          )
          .join("");
      };
      const fetchList = async () => {
        setSaveStatus("加载列表…");
        try {
          const res = await fetch(`${apiBase}/api/drawings?limit=20`);
          const t = await res.text();
          if (!t) throw new Error(res.statusText || "后端无返回");
          const data = JSON.parse(t);
          renderList(Array.isArray(data) ? data : []);
          setSaveStatus("完成");
        } catch (err) {
          setSaveStatus(err.message || "错误", "error");
        }
      };
      const pickItemByIndex = (n) => {
        if (!listCache.length) {
          setSaveStatus("列表为空", "error");
          return null;
        }
        const idx = n - 1;
        if (idx < 0 || idx >= listCache.length) {
          setSaveStatus("序号超出范围", "error");
          return null;
        }
        return listCache[idx];
      };
      const loadByNumber = (n) => {
        const item = pickItemByIndex(n);
        if (!item) return;
        setSaveStatus(`加载 ${item.id}…`);
        fetch(`${apiBase}/api/drawings/${item.id}`)
          .then((res) => res.text().then((t) => ({ ok: res.ok, t })))
          .then(({ ok, t }) => {
            if (!t) throw new Error("后端无返回");
            const data = JSON.parse(t);
            if (!ok) throw new Error(data.detail || "加载失败");
            if (data.background_base64) {
              window._lastImage = { image_base64: data.background_base64.replace(/^data:image\/png;base64,/, ""), asr_text: data.asr_text };
              renderImage(window._lastImage.image_base64);
            }
            setSaveStatus("加载完成");
          })
          .catch((err) => setSaveStatus(err.message || "错误", "error"));
      };
      const deleteByNumber = (n) => {
        const item = pickItemByIndex(n);
        if (!item) return;
        setSaveStatus(`删除 ${item.id}…`);
        fetch(`${apiBase}/api/drawings/${item.id}`, { method: "DELETE" })
          .then((res) => {
            if (!res.ok) return res.text().then((t) => Promise.reject(t || res.statusText));
          })
          .then(() => {
            setSaveStatus("已删除");
            fetchList();
          })
          .catch((err) => setSaveStatus(err || "错误", "error"));
      };
      const saveCurrent = async () => {
        const img = window._lastImage?.image_base64;
        if (!img) {
          setSaveStatus("暂无生成的图片可保存", "error");
          return;
        }
        const title = $("title").value || "AI图片";
        setSaveStatus("保存中…");
        try {
          const payload = {
            title,
            commands: [],
            asr_text: window._lastImage?.asr_text || "",
            reply_text: window._lastImage?.prompt_en || "",
            background_base64: `data:image/png;base64,${img}`,
          };
          const res = await fetch(`${apiBase}/api/drawings`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const t = await res.text();
          if (!t) throw new Error(res.statusText || "后端无返回");
          const data = JSON.parse(t);
          if (!res.ok) throw new Error(data.detail || res.statusText);
          setSaveStatus("已保存");
          fetchList();
        } catch (err) {
          setSaveStatus(err.message || "错误", "error");
        }
      };
      const getImageBlob = async () => {
        let b64 = normalizeImageB64(window._lastImage?.image_base64);
        if (b64) {
          try {
            const bin = atob(b64);
            const arr = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
            const blob = new Blob([arr], { type: "image/png" });
            if (blob.size > 100) return blob;
          } catch (e) {}
        }
        const imgEl = document.querySelector("#img-box img");
        if (imgEl?.src) {
          try {
            const resp = await fetch(imgEl.src);
            const blob = await resp.blob();
            if (blob.size > 100) return blob;
          } catch (e) {}
        }
        return null;
      };
      const downloadImage = async () => {
        const blob = await getImageBlob();
        if (!blob) {
          setSaveStatus("暂无图片可下载，请先生成", "error");
          return;
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `ai-image-${Date.now()}.png`;
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }, 200);
        setSaveStatus("图片已开始下载，请在浏览器下载栏查看");
      };
      listEl.addEventListener("click", (e) => {
        const btn = e.target;
        if (btn.classList.contains("btn-load")) {
          const id = btn.getAttribute("data-id");
          setSaveStatus(`加载 ${id}…`);
          fetch(`${apiBase}/api/drawings/${id}`)
            .then((res) => res.text().then((t) => ({ ok: res.ok, t })))
            .then(({ ok, t }) => {
              if (!t) throw new Error("后端无返回");
              const data = JSON.parse(t);
              if (!ok) throw new Error(data.detail || "加载失败");
              if (data.background_base64) {
                window._lastImage = { image_base64: data.background_base64.replace(/^data:image\/png;base64,/, ""), asr_text: data.asr_text };
                renderImage(window._lastImage.image_base64);
              }
              setSaveStatus("加载完成");
            })
            .catch((err) => setSaveStatus(err.message || "错误", "error"));
        } else if (btn.classList.contains("btn-delete")) {
          const id = btn.getAttribute("data-id");
          if (!confirm(`确认删除 ${id}？`)) return;
          setSaveStatus(`删除 ${id}…`);
          fetch(`${apiBase}/api/drawings/${id}`, { method: "DELETE" })
            .then((res) => {
              if (!res.ok) return res.text().then((t) => Promise.reject(t || res.statusText));
            })
            .then(() => {
              setSaveStatus("已删除");
              fetchList();
            })
            .catch((err) => setSaveStatus(err || "错误", "error"));
        }
      });
      $("btn-save").onclick = saveCurrent;
      $("btn-list").onclick = fetchList;
      const downloadBtn = document.createElement("button");
      downloadBtn.textContent = "下载图片";
      downloadBtn.className = "rounded-lg bg-slate-900 text-white px-3 py-2 text-sm font-semibold hover:bg-slate-800";
      downloadBtn.onclick = downloadImage;
      document.querySelector("section.rounded-2xl.border.border-slate-200.bg-white.p-5.shadow-sm.space-y-3 .flex.flex-wrap").appendChild(downloadBtn);
      fetchList();
    </script>
  </body>
</html>
