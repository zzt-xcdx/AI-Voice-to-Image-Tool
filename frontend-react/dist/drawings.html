<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>画板库 - Voice2Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="mx-auto max-w-6xl px-4 py-8 space-y-6">
      <header class="flex items-center gap-3">
        <a href="/" class="text-sm text-slate-500 hover:underline">← 返回选择</a>
        <div>
          <p class="text-xs uppercase text-amber-500 font-semibold">画板库 / API</p>
          <h1 class="text-2xl font-bold text-slate-900">后端 /api/drawings 列表</h1>
          <p class="text-slate-600 text-sm">查看历史画板，预览命令和背景，支持删除。</p>
        </div>
      </header>

      <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
        <div class="flex items-center gap-2">
          <button id="btn-refresh" class="rounded-xl bg-slate-900 text-white px-4 py-2 text-sm font-semibold hover:bg-slate-800">刷新列表</button>
          <span id="status" class="text-xs text-amber-700"></span>
        </div>
        <div id="list" class="grid gap-3 md:grid-cols-2"></div>
      </section>

      <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm space-y-3">
        <h2 class="text-sm font-semibold text-slate-900">详情</h2>
        <div class="text-xs text-slate-500 mb-1">基本信息</div>
        <div id="detail-meta" class="rounded-lg border border-slate-100 bg-slate-50 p-3 text-sm text-slate-800 min-h-[40px]"></div>
        <div class="text-xs text-slate-500 mb-1">命令 JSON</div>
        <pre id="detail-json" class="rounded-lg border border-slate-100 bg-slate-50 p-3 text-xs text-slate-700 whitespace-pre-wrap min-h-[120px]"></pre>
        <div class="text-xs text-slate-500 mb-1">背景预览</div>
        <div id="detail-bg" class="rounded-lg border border-slate-100 bg-slate-50 p-3 flex items-center justify-center min-h-[200px] text-slate-400 text-sm">无背景</div>
      </section>
    </div>

    <script>
      const apiBase = "";
      const $ = (id) => document.getElementById(id);
      const statusEl = $("status");
      const listEl = $("list");
      const metaEl = $("detail-meta");
      const jsonEl = $("detail-json");
      const bgEl = $("detail-bg");

      const setStatus = (msg, tone = "info") => {
        statusEl.textContent = msg || "";
        statusEl.className = "text-xs " + (tone === "error" ? "text-rose-700" : "text-amber-700");
      };

      const renderList = (items) => {
        if (!items || !items.length) {
          listEl.innerHTML = '<div class="text-sm text-slate-500">暂无记录</div>';
          return;
        }
        listEl.innerHTML = items
          .map(
            (d) => `
          <div class="rounded-xl border border-slate-200 bg-white p-3 shadow-sm flex flex-col gap-2">
            <div class="flex items-center justify-between">
              <div class="text-sm font-semibold text-slate-900 truncate">${d.title || `画板 #${d.id}`}</div>
              <span class="text-[11px] text-slate-500">ID: ${d.id}</span>
            </div>
            <div class="text-xs text-slate-500">命令数：${d.commands?.length || 0}</div>
            <div class="text-xs text-slate-500">${d.created_at || ""}</div>
            <div class="flex items-center gap-2">
              <button data-id="${d.id}" class="btn-detail rounded-lg border border-slate-200 px-3 py-1.5 text-xs font-semibold text-slate-700 hover:bg-slate-100">查看</button>
              <button data-id="${d.id}" class="btn-delete rounded-lg border border-rose-200 px-3 py-1.5 text-xs font-semibold text-rose-700 hover:bg-rose-50">删除</button>
            </div>
          </div>
        `
          )
          .join("");
      };

      const renderDetail = (data) => {
        if (!data) {
          metaEl.textContent = "";
          jsonEl.textContent = "";
          bgEl.innerHTML = '<span class="text-slate-400 text-sm">无背景</span>';
          return;
        }
        metaEl.textContent = `ID: ${data.id} | 标题: ${data.title || ""} | 命令数: ${data.commands?.length || 0} | 时间: ${data.created_at || ""}`;
        jsonEl.textContent = JSON.stringify(data.commands || [], null, 2);
        if (data.background_base64) {
          bgEl.innerHTML = `<img class="max-h-[320px] rounded-lg border border-slate-200 shadow" src="${data.background_base64}" />`;
        } else {
          bgEl.innerHTML = '<span class="text-slate-400 text-sm">无背景</span>';
        }
      };

      const fetchList = async () => {
        setStatus("加载列表…");
        try {
          const res = await fetch(`${apiBase}/api/drawings?limit=50`);
          const t = await res.text();
          if (!t) throw new Error(res.statusText || "后端无返回");
          const data = JSON.parse(t);
          if (!Array.isArray(data)) throw new Error("返回格式异常");
          renderList(data);
          setStatus("完成");
        } catch (err) {
          setStatus(err.message || "错误", "error");
        }
      };

      const fetchDetail = async (id) => {
        setStatus(`加载 ${id}…`);
        try {
          const res = await fetch(`${apiBase}/api/drawings/${id}`);
          const t = await res.text();
          if (!t) throw new Error(res.statusText || "后端无返回");
          const data = JSON.parse(t);
          if (!data || !data.commands) throw new Error("记录无命令数据");
          renderDetail(data);
          setStatus("完成");
        } catch (err) {
          setStatus(err.message || "错误", "error");
        }
      };

      const deleteOne = async (id) => {
        if (!confirm(`确认删除 ID ${id}？`)) return;
        setStatus(`删除 ${id}…`);
        try {
          const res = await fetch(`${apiBase}/api/drawings/${id}`, { method: "DELETE" });
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.detail || res.statusText);
          }
          renderDetail(null);
          await fetchList();
          setStatus("删除完成");
        } catch (err) {
          setStatus(err.message || "错误", "error");
        }
      };

      listEl.addEventListener("click", (e) => {
        const btn = e.target;
        if (btn.classList.contains("btn-detail")) {
          const id = btn.getAttribute("data-id");
          fetchDetail(id);
        } else if (btn.classList.contains("btn-delete")) {
          const id = btn.getAttribute("data-id");
          deleteOne(id);
        }
      });

      $("btn-refresh").onclick = fetchList;
      fetchList();
    </script>
  </body>
</html>
